name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Stage 1 : Tests
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - run: npm ci
      - name: Run tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output-node-${{ matrix.node-version }}
          path: test-output.txt
      - name: Use secrets
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Secrets are masked in logs"
          echo "DB_PASSWORD length: ${#DB_PASSWORD}"

  # Stage 2 : Build image Docker (workflow réutilisable)
  build:
    needs: test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image-name: devops-app
      context: .

  # Stage 3 : Smoke test
  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-app:smoke .

      - name: Start container
        run: docker run -d -p 3000:3000 --name smoke-app devops-app:smoke

      - name: Wait for app to be ready
        run: sleep 5

      - name: Check /health
        run: curl --fail http://localhost:3000/health

      - name: Check /metrics
        run: curl --fail http://localhost:3000/metrics

      - name: Cleanup
        if: always()
        run: docker rm -f smoke-app

  # Stage 4 : Scan de sécurité
  security:
    needs: [build, smoke-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan application files
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'table'

  # Stage 5 : Deploy staging (auto)
  deploy-staging:
    needs: [security]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: echo "Deploying to staging..."

  # Stage 6 : Deploy production (reviewer requis)
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Deploying to production..."
